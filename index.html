<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Sorry Message 💌</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #ff9a9e, #fad0c4);
    height: 100vh;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
}

.card {
    background: white;
    padding: 30px;
    border-radius: 20px;
    width: 350px;
    text-align: center;
    box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    z-index: 2;
}

h2 {
    color: #ff4b5c;
}

.message {
    font-size: 16px;
    color: #333;
    margin: 20px 0;
    min-height: 80px;
    white-space: pre-line;
}

button {
    padding: 10px 20px;
    border: none;
    border-radius: 25px;
    background: #ff4b5c;
    color: white;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    background: #e8434f;
    transform: scale(1.05);
}

/* ❤️ Floating Hearts */
.heart {
    position: absolute;
    color: #ff4b5c;
    font-size: 20px;
    animation: floatUp 6s linear infinite;
}

@keyframes floatUp {
    0% {transform: translateY(100vh) scale(1);}
    100% {transform: translateY(-10vh) scale(1.5);}
}
</style>
</head>

<body>

<div class="card">
    <h2>I'm Sorry 💔</h2>
    <div class="message" id="text"></div>
    <button onclick="toggleMessage()">Click Me ❤️</button>
</div>

<!-- 🎵 Soft Music -->
<audio id="bgMusic" autoplay loop>
    <source src="https://www.bensound.com/bensound-music/bensound-love.mp3" type="audio/mp3">
</audio>

<script>
const originalMsg = "Because of my full-day work schedule (2 PM to 11 PM IST), I couldn’t talk to you today. I’m really sorry for that.";
const promiseMsg = "I promise tomorrow I’ll make sure we talk properly ❤️\n\nYou mean a lot to me 💕";
let showingPromise = false;
let i = 0;

// Typing Effect
function typeWriter(text) {
    document.getElementById("text").innerHTML = "";
    i = 0;
    function typing() {
        if (i < text.length) {
            document.getElementById("text").innerHTML += text.charAt(i);
            i++;
            setTimeout(typing, 30);
        }
    }
    typing();
}

typeWriter(originalMsg);

// Toggle Message
function toggleMessage() {
    if (!showingPromise) {
        typeWriter(promiseMsg);
    } else {
        typeWriter(originalMsg);
    }
    showingPromise = !showingPromise;
}

// Floating Hearts Generator
function createHeart() {
    const heart = document.createElement("div");
    heart.classList.add("heart");
    heart.innerHTML = "❤️";
    heart.style.left = Math.random() * 100 + "vw";
    heart.style.fontSize = (15 + Math.random() * 20) + "px";
    heart.style.animationDuration = (4 + Math.random() * 3) + "s";
    document.body.appendChild(heart);

    setTimeout(() => {
        heart.remove();
    }, 6000);
}

setInterval(createHeart, 500);

// Fix autoplay issue (user interaction required in some browsers)
document.body.addEventListener("click", () => {
    document.getElementById("bgMusic").play();
});
</script>

</body>
</html>
