<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Sorry Message 💌</title>
<style>
    body {
        margin: 0;
        font-family: 'Segoe UI', sans-serif;
        background: linear-gradient(135deg, #ff9a9e, #fad0c4);
        height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
    }

    .card {
        background: white;
        padding: 30px;
        border-radius: 20px;
        width: 350px;
        text-align: center;
        box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        animation: fadeIn 1s ease-in-out;
    }

    h2 {
        color: #ff4b5c;
    }

    .message {
        font-size: 16px;
        color: #333;
        margin: 20px 0;
        min-height: 80px;
    }

    button {
        padding: 10px 20px;
        border: none;
        border-radius: 25px;
        background: #ff4b5c;
        color: white;
        cursor: pointer;
        transition: 0.3s;
    }

    button:hover {
        background: #e8434f;
        transform: scale(1.05);
    }

    @keyframes fadeIn {
        from {opacity: 0; transform: translateY(20px);}
        to {opacity: 1; transform: translateY(0);}
    }
</style>
</head>

<body>

<div class="card">
    <h2>I'm Sorry 💔</h2>
    <div class="message" id="text"></div>
    <button onclick="showPromise()">Click Me ❤️</button>
</div>

<script>
    const msg = "Because of my full-day work schedule (2 PM to 11 PM IST), I couldn’t talk to you today. I’m really sorry for that. You are very special to me 💖";

    let i = 0;
    function typeWriter() {
        if (i < msg.length) {
            document.getElementById("text").innerHTML += msg.charAt(i);
            i++;
            setTimeout(typeWriter, 40);
        }
    }

    typeWriter();

    function showPromise() {
        document.getElementById("text").innerHTML = 
        "I promise tomorrow I’ll make sure we talk properly ❤️<br><br>You mean a lot to me 💕";
    }
</script>

</body>
</html>
